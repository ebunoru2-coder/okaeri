<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>お帰りボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:#000;color-scheme:dark;}
#bg{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;}
#app{position:relative;}
body{
  font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic UI','YuGothic','Meiryo',sans-serif;
  touch-action:manipulation;min-height:100vh;color:#eee;
  padding:22px calc(10px + env(safe-area-inset-right,0px)) 96px calc(10px + env(safe-area-inset-left,0px));
}
button{font-family:inherit;-webkit-user-select:none;user-select:none;}
#board{max-width:460px;margin:0;display:flex;flex-direction:column;gap:13px;}
.row{display:flex;height:56px;gap:6px;overflow-x:auto;scrollbar-width:none;}
.row::-webkit-scrollbar{display:none;}
.namearea{width:128px;display:flex;gap:5px;flex-shrink:0;}
.ptag{width:26px;background:#e56cc3;border-radius:3px;flex-shrink:0;}
.namebox{flex:1;min-width:0;background:#f1f1f1;border-radius:3px;display:flex;align-items:center;
  padding:0 10px;color:#151515;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.6);
  cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.jname{width:100%;display:flex;justify-content:space-between;}
.jname1{width:100%;text-align:center;}
.jname0{opacity:.3;font-size:16px;}
.abtn{padding:0 11px;min-width:52px;height:100%;border-radius:3px;color:#151515;font-weight:700;
  letter-spacing:1px;box-shadow:0 1px 3px rgba(0,0,0,.6);flex-shrink:0;white-space:nowrap;
  display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;
  transition:opacity .12s,transform .06s;}
.abtn:active{transform:scale(.94);}
.abtn.done{opacity:.28;box-shadow:inset 0 0 0 2px rgba(255,255,255,.25);}
.plus{width:36px;height:100%;flex-shrink:0;border-radius:3px;background:#141414;
  border:1.5px dashed #3c3c3c;color:#777;font-size:20px;cursor:pointer;}
.empty{color:#555;text-align:center;padding:30px;font-size:14px;}
/* 編集モード */
.erow{display:flex;align-items:center;gap:5px;}
.epink{width:30px;height:38px;border-radius:4px;border:none;cursor:pointer;flex-shrink:0;
  background:#1f1f1f;box-shadow:inset 0 0 0 1.5px #3a3a3a;}
.epink.on{background:#e56cc3;box-shadow:none;}
.ename{flex:1;min-width:0;height:38px;background:#161616;border:1.5px solid #333;border-radius:4px;
  color:#eee;padding:0 10px;font-size:17px;outline:none;font-family:inherit;}
.ectl{width:30px;height:38px;border-radius:4px;border:none;background:#1f1f1f;color:#bbb;
  cursor:pointer;flex-shrink:0;font-size:15px;}
.ectl.confirm{width:46px;background:#c0392b;color:#fff;font-size:12px;font-weight:700;}
.eout{font-weight:700;font-size:13px;}
.eout.isoff{background:#e56cc3;color:#1a0214;}
/* ツールバー */
#bar{position:fixed;left:0;right:0;bottom:0;display:flex;flex-wrap:wrap;justify-content:flex-end;
  gap:8px;padding:24px 14px 12px;background:linear-gradient(transparent,rgba(0,0,0,.92) 55%);z-index:30;
  pointer-events:none;}
.tool{background:#1c1c1c;color:#ccc;border:1.5px solid #383838;border-radius:999px;
  padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;
  pointer-events:auto;}
.tool.accent{background:#e56cc3;color:#1a0214;border:none;}
#dot{position:fixed;right:calc(10px + env(safe-area-inset-right,0px));bottom:calc(10px + env(safe-area-inset-bottom,0px));width:34px;height:34px;border-radius:999px;
  border:1px solid #2e2e2e;background:#161616;color:#777;font-size:16px;line-height:1;
  cursor:pointer;opacity:.4;z-index:30;}
/* シート共通 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:40;display:flex;align-items:flex-end;}
.sheet{width:100%;background:#101010;border-top:1px solid #2d2d2d;border-radius:16px 16px 0 0;
  display:flex;flex-direction:column;}
.sheet.palette{height:78vh;}
.sheet.settings{max-height:80vh;overflow-y:auto;
  padding:14px 18px calc(20px + env(safe-area-inset-bottom));gap:20px;}
.shead{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px;}
.settings .shead{padding:0;}
.stitle{color:#eee;font-size:16px;font-weight:700;}
.xbtn{background:#242424;color:#ccc;border:none;border-radius:999px;width:32px;height:32px;
  font-size:15px;cursor:pointer;}
.shint{flex-shrink:0;color:#666;font-size:12px;padding:0 16px 10px;}
#pscroll{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:4px 16px 16px;display:flex;flex-wrap:wrap;gap:9px;align-content:flex-start;}
.chip{color:#151515;font-weight:600;font-size:16px;padding:10px 12px;border-radius:3px;border:none;
  cursor:pointer;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.6);}
.chip.on{box-shadow:0 0 0 2.5px #fff;}
.cwrap{position:relative;}
.cx{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:999px;
  border:1.5px solid #444;background:#111;color:#999;font-size:10px;line-height:1;cursor:pointer;}
.creator{flex-shrink:0;border-top:1px solid #262626;background:#151515;
  padding:12px 16px calc(14px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;}
.clabel{color:#aaa;font-size:13px;font-weight:700;}
.crow{display:flex;gap:8px;align-items:center;}
#newlabel{flex:1;min-width:0;height:44px;background:#0d0d0d;border:1.5px solid #333;border-radius:6px;
  color:#eee;padding:0 12px;font-size:16px;outline:none;font-family:inherit;}
#addbtn{flex-shrink:0;border:none;border-radius:6px;padding:0 18px;height:44px;font-size:15px;
  font-weight:700;cursor:pointer;}
.dot{width:34px;height:34px;border-radius:999px;border:none;cursor:pointer;padding:0;}
.dot.w{border:1px solid #555;}
.dot.sel{box-shadow:0 0 0 3px #101010,0 0 0 5.5px #fff;}
.small{color:#666;font-size:12px;}
/* 設定シート */
.sec{display:flex;flex-direction:column;gap:10px;}
.zbtn{width:52px;height:52px;border-radius:12px;border:1.5px solid #3a3a3a;background:#1f1f1f;
  color:#eee;font-size:24px;font-weight:700;cursor:pointer;}
.zval{color:#eee;font-size:22px;font-weight:700;min-width:76px;text-align:center;}
.zreset{background:transparent;border:1.5px solid #3a3a3a;color:#999;border-radius:999px;
  padding:8px 14px;font-size:13px;cursor:pointer;}
.pill{background:#1f1f1f;color:#ccc;border:1.5px solid #3a3a3a;border-radius:999px;
  padding:12px 20px;font-size:15px;font-weight:700;cursor:pointer;align-self:flex-start;}
.pill.on{background:#e56cc3;color:#1a0214;border:none;}
.pill.danger{background:#c0392b;color:#fff;border:none;}
.warn{color:#d98f5f;font-size:12px;}
.note{color:#555;font-size:12px;line-height:1.8;}
#frame{position:fixed;top:0;left:0;right:0;bottom:0;border:4px solid #00e676;pointer-events:none;z-index:60;}
/* ===== 横画面：パレット・設定は右側の縦パネル、ツールバーは右下のみ ===== */
@media (orientation: landscape){
  body{padding-top:8px;padding-left:calc(4px + env(safe-area-inset-left,0px));}
  #board{max-width:none;}
  .overlay{align-items:stretch;justify-content:flex-end;}
  .sheet{width:520px;max-width:62vw;
    border-radius:16px 0 0 16px;border-top:none;border-left:1px solid #2d2d2d;}
  .sheet.palette{height:100%;}
  .sheet.settings{height:100%;max-height:100%;}
  .creator{padding:10px 16px calc(10px + env(safe-area-inset-bottom,0px));}
  #bar{left:auto;background:none;
    padding:12px calc(14px + env(safe-area-inset-right,0px)) calc(12px + env(safe-area-inset-bottom,0px)) 14px;}
}
</style>
</head>
<body>
<div id="bg"></div>
<div id="app"></div>
<script>
(function(){
"use strict";

var LSKEY = "okaeri-board:html:v1";

var PALETTE = { y:"#ece769", r:"#e75b48", w:"#f1f1f1", m:"#d244d2" };

var DEFAULT_COMMANDS = [
  ["外","m"],["バンド","y"],["終了","r"],["S1帰","m"],["S1行","m"],
  ["ホール","m"],["A行","m"],["A帰","m"],["S2帰","m"],["S2行","m"],
  ["ホール3","m"],["B行","m"],["B帰","m"],["S3帰","m"],["S3行","m"],
  ["ホール2","m"],["C行","m"],["C帰","m"],["予案","y"],["ワッフ","y"],
  ["ホール1","m"],["D行","m"],["D帰","m"],["携帯","y"],["追加","y"],
  ["アンケ","y"],["F行","m"],["F帰","m"],["荷物","y"],["プレ","y"],
  ["お帰り","r"],["G行","m"],["G帰","m"],["持帰り","y"],["領収証","y"],
  ["タクシ","y"],["ペン","y"],["杖","y"],["充電器","y"],["メット","y"],
  ["ワッフ・プレ","y"],["登録","w"]
].map(function(a){ return { label:a[0], color:a[1] }; });

function uid(){ return "p" + Math.random().toString(36).slice(2,8) + Date.now().toString(36); }
function ankeExtra(){ return { id:uid(), label:"アンケ", color:"y" }; }
function okaeriExtra(){ return { id:uid(), label:"お帰り", color:"r" }; }
function baseExtras(){ return [ankeExtra(), okaeriExtra()]; }
function defaults(){
  var a=[]; for(var i=0;i<8;i++) a.push({ id:uid(), name:"", pink:false, extras:baseExtras(), done:{} });
  return a;
}
function ensure(p){
  return { id:p.id||uid(), name:p.name||"", pink:!!p.pink, off:!!p.off,
    extras:Array.isArray(p.extras)?p.extras:[], done:p.done||{} };
}
function insertExtra(extras, ex){
  if(ex.label==="アンケ") return [ex].concat(extras);
  if(ex.label==="お帰り"){
    var i=-1;
    for(var k=0;k<extras.length;k++){ if(extras[k].label==="アンケ"){ i=k; break; } }
    var at=i>=0?i+1:0; var n=extras.slice(); n.splice(at,0,ex); return n;
  }
  return extras.concat([ex]);
}
function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
  });
}
// 横画面のときは文字を1.6倍に（行の高さは同じまま、文字が箱を大きく使う）
function txtScale(){
  return (window.innerWidth>window.innerHeight && !edit) ? 1.6 : 1;
}
// 名前の文字サイズ：統一モードでは全員同じ大きさ
function nameSize(n){
  var s=txtScale();
  if(uniformName) return Math.round(20*s);
  var l=Array.from(n||"").length;
  return Math.round((l<=3?20 : l===4?17 : 14)*s);
}
// 統一モードのとき、一番長い名前に合わせて名前欄の幅を決める（全行そろえる）
function nameColW(){
  var s=txtScale();
  var base=Math.round(128*Math.min(s,1.3));
  if(!uniformName || !people) return base;
  var m=0, anyPink=false;
  for(var i=0;i<people.length;i++){
    var l=Array.from(people[i].name||"").length;
    if(l>m) m=l;
    if(people[i].pink) anyPink=true;
  }
  var need=Math.round(m*(20*s+2))+26+(anyPink?35:0);
  return Math.max(base, Math.min(need, 460));
}
function nameHTML(n){
  var chars=Array.from(n||"");
  if(chars.length===0) return '<span class="jname0">名前</span>';
  if(chars.length===1) return '<span class="jname1">'+esc(n)+'</span>';
  return '<span class="jname">'+chars.map(function(c){return '<span>'+esc(c)+'</span>';}).join("")+'</span>';
}

// ===== 状態 =====
var people=null, custom=[], zoom=1, hideBar=false, fitLandscape=true, uniformName=true, baseRows=8, hidePlus=false, fitAdj=1, showFrame=false, dispW=100;
var edit=false, paletteFor=null, showSettings=false, confirmId=null;
var newLabel="", newColor="y";
var isFs=false, wakeOn=false, wantWake=false, wakeSentinel=null;
var wakeErr="", fsErr="";
var lastTap={}, confirmT=null, saveT=null;
var allResetConfirm=false, allResetT=null;
var undoStack=[]; // 「↶ 戻す」用の履歴（画面を開いている間だけ保持）
function snap(){
  var s=JSON.stringify(people);
  if(undoStack.length && undoStack[undoStack.length-1]===s) return;
  undoStack.push(s);
  if(undoStack.length>30) undoStack.shift();
}
var storageOk=true;

try{ localStorage.setItem("__okaeri_t","1"); localStorage.removeItem("__okaeri_t"); }
catch(e){ storageOk=false; }

// ===== 保存・読み込み =====
function saveNow(){
  if(!storageOk) return;
  try{
    localStorage.setItem(LSKEY, JSON.stringify({
      people:people, customCommands:custom,
      settings:{ zoom:zoom, wake:wakeOn, hideBar:hideBar, fitLandscape:fitLandscape, uniformName:uniformName, baseRows:baseRows, hidePlus:hidePlus, fitAdj:fitAdj, showFrame:showFrame, dispW:dispW }
    }));
  }catch(e){}
}
function saveDebounced(){ clearTimeout(saveT); saveT=setTimeout(saveNow,300); }
function commit(){ saveDebounced(); render(); }

function load(){
  try{
    var d=JSON.parse(localStorage.getItem(LSKEY)||"null");
    if(d){
      if(Array.isArray(d.people)) people=d.people.map(ensure);
      if(Array.isArray(d.customCommands)) custom=d.customCommands;
      if(d.settings){
        if(typeof d.settings.zoom==="number") zoom=Math.min(2.2,Math.max(0.7,d.settings.zoom));
        hideBar=!!d.settings.hideBar;
        fitLandscape=d.settings.fitLandscape!==false;
        uniformName=d.settings.uniformName!==false;
        hidePlus=!!d.settings.hidePlus;
        showFrame=!!d.settings.showFrame;
        if(typeof d.settings.dispW==="number"){
          dispW=Math.min(100, Math.max(30, d.settings.dispW));
        }
        if(typeof d.settings.fitAdj==="number"){
          fitAdj=Math.min(2.5, Math.max(0.5, d.settings.fitAdj));
        }
        if(typeof d.settings.baseRows==="number"){
          baseRows=Math.min(20, Math.max(1, d.settings.baseRows));
        }
        if(d.settings.wake) enableWake(false);
      }
    }
  }catch(e){}
  if(!people||!people.length) people=defaults();
}

// ===== スリープ防止（Wake Lock） =====
function enableWake(manual){
  if(!("wakeLock" in navigator)){
    wantWake=false; wakeOn=false;
    if(manual){
      wakeErr="この端末では使えないようです。端末の設定で画面消灯を「なし」にしてください。";
      render();
    }
    saveDebounced(); return;
  }
  navigator.wakeLock.request("screen").then(function(s){
    if(wakeSentinel){ try{ wakeSentinel.release(); }catch(e){} }
    wakeSentinel=s; wantWake=true; wakeOn=true; wakeErr="";
    saveDebounced(); if(showSettings) render();
  }).catch(function(){
    wantWake=false; wakeOn=false;
    if(manual){
      wakeErr="この環境ではスリープ防止が使えないようです。端末の設定で画面消灯を「なし」にしてください。";
    }
    saveDebounced(); if(showSettings) render();
  });
}
function disableWake(){
  wantWake=false;
  try{ if(wakeSentinel) wakeSentinel.release(); }catch(e){}
  wakeSentinel=null; wakeOn=false;
  saveDebounced(); if(showSettings) render();
}
document.addEventListener("visibilitychange", function(){
  if(document.visibilityState==="visible" && wantWake) enableWake(false);
});

// ===== 全画面 =====
function syncFs(){
  isFs=!!(document.fullscreenElement||document.webkitFullscreenElement);
  if(showSettings) render();
}
document.addEventListener("fullscreenchange", syncFs);
document.addEventListener("webkitfullscreenchange", syncFs);
function toggleFs(){
  fsErr="";
  var d=document, el=d.documentElement;
  function fail(){
    fsErr="この環境では全画面にできません。ブラウザのメニューから全画面表示をお試しください。";
    render();
  }
  try{
    if(!d.fullscreenElement && !d.webkitFullscreenElement){
      if(el.requestFullscreen){ el.requestFullscreen().then(render).catch(fail); }
      else if(el.webkitRequestFullscreen){ el.webkitRequestFullscreen(); render(); }
      else fail();
    }else{
      if(d.exitFullscreen){ d.exitFullscreen().then(render).catch(render); }
      else if(d.webkitExitFullscreen){ d.webkitExitFullscreen(); render(); }
    }
  }catch(e){ fail(); }
}

// ===== HTML生成 =====
function rowHTML(p){
  if(p.off) return '<div class="row"></div>'; // 休み中：場所だけ空けて非表示
  var chips=(p.extras||[]).map(function(e2){
    var col=PALETTE[e2.color]||e2.color;
    var fs=Math.round((Array.from(e2.label).length<=2?17:19)*txtScale());
    var dn=p.done&&p.done[e2.id];
    return '<button class="abtn'+(dn?' done':'')+'" style="background:'+col+';font-size:'+fs+'px" '+
      'data-act="done" data-pid="'+p.id+'" data-key="'+e2.id+'">'+esc(e2.label)+'</button>';
  }).join("");
  return '<div class="row" data-row="'+p.id+'">'+
    '<div class="namearea" style="width:'+nameColW()+'px">'+(p.pink?'<div class="ptag"></div>':'')+
    '<div class="namebox" data-act="nametap" data-pid="'+p.id+'" style="font-size:'+nameSize(p.name)+'px">'+
    nameHTML(p.name)+'</div></div>'+chips+
    (hidePlus?'':'<button class="plus" data-act="palette" data-pid="'+p.id+'">＋</button>')+'</div>';
}
function editRowHTML(p){
  var cf=confirmId===p.id;
  return '<div class="erow"'+(p.off?' style="opacity:.55"':'')+'>'+
    '<button class="ectl eout'+(p.off?' isoff':'')+'" data-act="offtoggle" data-pid="'+p.id+'">'+(p.off?'出':'休')+'</button>'+
    '<button class="epink'+(p.pink?' on':'')+'" data-act="pink" data-pid="'+p.id+'"></button>'+
    '<input class="ename" data-input="name" data-pid="'+p.id+'" value="'+esc(p.name)+'" placeholder="名前" maxlength="10">'+
    '<button class="ectl" data-act="up" data-pid="'+p.id+'">↑</button>'+
    '<button class="ectl" data-act="down" data-pid="'+p.id+'">↓</button>'+
    '<button class="ectl'+(cf?' confirm':'')+'" data-act="del" data-pid="'+p.id+'">'+(cf?'削除':'✕')+'</button>'+
    '</div>';
}
function paletteHTML(){
  var t=null;
  for(var i=0;i<people.length;i++){ if(people[i].id===paletteFor){ t=people[i]; break; } }
  if(!t) return "";
  function isOn(l){
    for(var k=0;k<t.extras.length;k++){ if(t.extras[k].label===l) return true; }
    return false;
  }
  var dch=DEFAULT_COMMANDS.map(function(c){
    var on=isOn(c.label);
    return '<button class="chip'+(on?' on':'')+'" style="background:'+PALETTE[c.color]+'" '+
      'data-act="chip" data-label="'+esc(c.label)+'">'+(on?'✓ ':'')+esc(c.label)+'</button>';
  }).join("");
  var cch=custom.map(function(c){
    var on=isOn(c.label);
    return '<span class="cwrap"><button class="chip'+(on?' on':'')+'" style="background:'+(PALETTE[c.color]||c.color)+'" '+
      'data-act="chip" data-label="'+esc(c.label)+'">'+(on?'✓ ':'')+esc(c.label)+'</button>'+
      '<button class="cx" data-act="removecustom" data-label="'+esc(c.label)+'">✕</button></span>';
  }).join("");
  var hasL=(newLabel||"").trim();
  var dots=Object.keys(PALETTE).map(function(k){
    return '<button class="dot'+(k==="w"?' w':'')+(newColor===k?' sel':'')+'" style="background:'+PALETTE[k]+'" '+
      'data-act="newcolor" data-color="'+k+'"></button>';
  }).join("");
  return '<div class="overlay" data-act="overlay-palette"><div class="sheet palette" data-act="noop">'+
    '<div class="shead"><div class="stitle">'+(esc(t.name)||"（名前なし）")+' のコマンド</div>'+
    '<button class="xbtn" data-act="closepalette">✕</button></div>'+
    '<div class="shint">タップで付け外し（✓＝付いている）</div>'+
    '<div id="pscroll">'+dch+cch+'</div>'+
    '<div class="creator"><div class="clabel">新規コマンドを作る</div>'+
    '<div class="crow"><input id="newlabel" placeholder="コマンド名（例：E行）" maxlength="8" value="'+esc(newLabel)+'">'+
    '<button id="addbtn" data-act="addcustom" style="background:'+(hasL?PALETTE[newColor]:"#2a2a2a")+';color:'+(hasL?"#151515":"#666")+'">追加</button></div>'+
    '<div class="crow">'+dots+'<span class="small">色を選んで「追加」</span></div>'+
    '</div></div></div>';
}
function settingsHTML(){
  return '<div class="overlay" data-act="overlay-settings"><div class="sheet settings" data-act="noop">'+

function barHTML(){
  if(hideBar && !edit) return '<button id="dot" data-act="showbar" title="メニューを表示">⋯</button>';
  var h='<div id="bar">';
  if(!edit){
    h+='<button class="tool" data-act="hidebar">⌄ 隠す</button>';
    h+='<button class="tool" data-act="opensettings">⚙ 設定</button>';
    h+='<button class="tool" data-act="plusvis">'+(hidePlus?'＋ 表示':'＋ 隠す')+'</button>';
    h+='<button class="tool" data-act="undo" style="opacity:'+(undoStack.length?'1':'.45')+'">↶ 戻す</button>';
  }else{
    h+='<button class="tool" data-act="undo" style="opacity:'+(undoStack.length?'1':'.45')+'">↶ 戻す</button>';
    h+='<button class="tool" data-act="addperson">＋ 追加</button>';
  }
  h+='<button class="tool'+(edit?' accent':'')+'" data-act="editmode">'+(edit?'✓ 完了':'✎ 編集')+'</button>';
  return h+'</div>';
}

var app=document.getElementById("app");

// コマンド込みで一番幅が広い行を見積もる（倍率1のときのpx）
function estRowW(){
  var ts=txtScale(), max=0;
  var base=nameColW()+6;
  for(var i=0;i<people.length;i++){
    if(people[i].off) continue;
    var w=base;
    var ex=people[i].extras||[];
    for(var k=0;k<ex.length;k++){
      var l=Array.from(ex[k].label).length;
      var fpx=Math.round((l<=2?17:19)*ts);
      w+=Math.max(52, l*fpx+24)+6;
    }
    if(!hidePlus) w+=42;
    if(w>max) max=w;
  }
  return max||400;
}
// 横画面のとき、全員が縦にちょうど収まる倍率を計算する
function effZoom(){
  var landscape=window.innerWidth>window.innerHeight;
  if(!fitLandscape || !landscape || edit || !people || !people.length) return zoom;
  // 基準人数（既定8人）で倍率を決めるので、人数が減っても大きさは変わらない
  var rows=Math.max(people.length, baseRows);
  var naturalH=rows*56+(rows-1)*13; // 行の高さ56 + 行間13
  var availH=window.innerHeight-40; // 横画面は上下の余白を最小限に
  var availW=window.innerWidth*(dispW/100)-20; // 表示幅の設定内に収める
  var z=Math.min(availH/naturalH, availW/estRowW())*0.97*fitAdj;
  if(!(z>0)) return zoom;
  return Math.max(0.3, Math.min(z, 4));
}

function render(){
  // スクロール位置を保持
  var rowScrolls={};
  var rows=document.querySelectorAll("[data-row]");
  for(var i=0;i<rows.length;i++){
    if(rows[i].scrollLeft) rowScrolls[rows[i].getAttribute("data-row")]=rows[i].scrollLeft;
  }
  var ps=document.getElementById("pscroll");
  var pTop=ps?ps.scrollTop:null;

  var landscape=window.innerWidth>window.innerHeight;
  document.body.style.paddingBottom=(fitLandscape&&landscape&&!edit)?"14px":"96px";

  var h='<div style="zoom:'+effZoom()+'"><div id="board">';
  h+=people.map(function(p){ return edit?editRowHTML(p):rowHTML(p); }).join("");
  if(!people.length){
    h+='<div class="empty">'+(edit?'「＋ 追加」でメンバーを登録してください':'右下の「✎ 編集」からメンバーを追加できます')+'</div>';
  }
  h+='</div></div>';
  if(showFrame) h+='<div id="frame"></div>';
  if(paletteFor) h+=paletteHTML();
  if(showSettings) h+=settingsHTML();
  h+=barHTML();
  app.innerHTML=h;

  rows=document.querySelectorAll("[data-row]");
  for(var j=0;j<rows.length;j++){
    var key=rows[j].getAttribute("data-row");
    if(rowScrolls[key]) rows[j].scrollLeft=rowScrolls[key];
  }
  var ps2=document.getElementById("pscroll");
  if(ps2 && pTop!=null) ps2.scrollTop=pTop;
}

function findP(id){
  for(var i=0;i<people.length;i++){ if(people[i].id===id) return people[i]; }
  return null;
}

// ===== 操作 =====
document.addEventListener("click", function(e){
  var el=e.target.closest?e.target.closest("[data-act]"):null;
  if(!el) return;
  var act=el.getAttribute("data-act");
  if(act==="noop") return;
  if((act==="overlay-palette"||act==="overlay-settings") && e.target!==el) return;

  var p, id, label, cmd, i2;

  if(act==="done"){
    p=findP(el.getAttribute("data-pid"));
    if(p){ var k=el.getAttribute("data-key"); snap(); p.done[k]=!p.done[k]; commit(); }
  }
  else if(act==="nametap"){
    id=el.getAttribute("data-pid");
    var now=Date.now();
    if(now-(lastTap[id]||0)<350){
      lastTap[id]=0; p=findP(id);
      if(p){ snap(); p.pink=!p.pink; commit(); }
    }else{ lastTap[id]=now; }
  }
  else if(act==="palette"){ paletteFor=el.getAttribute("data-pid"); render(); }
  else if(act==="overlay-palette"||act==="closepalette"){ paletteFor=null; render(); }
  else if(act==="chip"){
    p=findP(paletteFor); if(!p) return;
    snap();
    label=el.getAttribute("data-label");
    var has=null;
    for(i2=0;i2<p.extras.length;i2++){ if(p.extras[i2].label===label){ has=p.extras[i2]; break; } }
    if(has){
      delete p.done[has.id];
      p.extras=p.extras.filter(function(x){ return x.id!==has.id; });
    }else{
      cmd=null;
      var all=DEFAULT_COMMANDS.concat(custom);
      for(i2=0;i2<all.length;i2++){ if(all[i2].label===label){ cmd=all[i2]; break; } }
      if(cmd) p.extras=insertExtra(p.extras,{id:uid(),label:cmd.label,color:cmd.color});
    }
    commit();
  }
  else if(act==="removecustom"){
    label=el.getAttribute("data-label");
    custom=custom.filter(function(c){ return c.label!==label; });
    commit();
  }
  else if(act==="newcolor"){
    newColor=el.getAttribute("data-color");
    var dots=document.querySelectorAll(".dot");
    for(i2=0;i2<dots.length;i2++){
      dots[i2].classList.toggle("sel", dots[i2].getAttribute("data-color")===newColor);
    }
    var b=document.getElementById("addbtn");
    if(b){
      var hs=(newLabel||"").trim();
      b.style.background=hs?PALETTE[newColor]:"#2a2a2a";
      b.style.color=hs?"#151515":"#666";
    }
  }
  else if(act==="addcustom"){
    label=(newLabel||"").trim();
    p=findP(paletteFor);
    if(!label||!p) return;
    snap();
    cmd=null;
    var all2=DEFAULT_COMMANDS.concat(custom);
    for(i2=0;i2<all2.length;i2++){ if(all2[i2].label===label){ cmd=all2[i2]; break; } }
    if(!cmd){ cmd={label:label,color:newColor}; custom.push(cmd); }
    var dup=false;
    for(i2=0;i2<p.extras.length;i2++){ if(p.extras[i2].label===label){ dup=true; break; } }
    if(!dup) p.extras=insertExtra(p.extras,{id:uid(),label:cmd.label,color:cmd.color});
    newLabel="";
    commit();
  }
  else if(act==="opensettings"){ showSettings=true; allResetConfirm=false; render(); }
  else if(act==="overlay-settings"||act==="closesettings"){
    showSettings=false; allResetConfirm=false; clearTimeout(allResetT); render();
  }
  else if(act==="zdec"){ zoom=Math.max(0.7,Math.round((zoom-0.1)*10)/10); commit(); }
  else if(act==="zinc"){ zoom=Math.min(2.2,Math.round((zoom+0.1)*10)/10); commit(); }
  else if(act==="zreset"){ zoom=1; commit(); }
  else if(act==="fit"){ fitLandscape=!fitLandscape; commit(); }
  else if(act==="uniform"){ uniformName=!uniformName; commit(); }
  else if(act==="plusvis"){ hidePlus=!hidePlus; commit(); }
  else if(act==="undo"){
    if(undoStack.length){
      people=JSON.parse(undoStack.pop());
      confirmId=null;
      commit();
    }
  }
  else if(act==="bdec"){ baseRows=Math.max(1, baseRows-1); commit(); }
  else if(act==="binc"){ baseRows=Math.min(20, baseRows+1); commit(); }
  else if(act==="bnow"){ baseRows=Math.min(20, Math.max(1, people.length)); commit(); }
  else if(act==="adec"){ fitAdj=Math.max(0.5, Math.round((fitAdj-0.05)*100)/100); commit(); }
  else if(act==="ainc"){ fitAdj=Math.min(2.5, Math.round((fitAdj+0.05)*100)/100); commit(); }
  else if(act==="areset"){ fitAdj=1; commit(); }
  else if(act==="frame"){ showFrame=!showFrame; commit(); }
  else if(act==="wdec"){ dispW=Math.max(30, dispW-5); commit(); }
  else if(act==="winc"){ dispW=Math.min(100, dispW+5); commit(); }
  else if(act==="wreset"){ dispW=100; commit(); }
  else if(act==="offtoggle"){
    p=findP(el.getAttribute("data-pid"));
    if(p){ snap(); p.off=!p.off; commit(); }
  }
  else if(act==="allreset"){
    if(allResetConfirm){
      clearTimeout(allResetT);
      allResetConfirm=false;
      snap();
      people=defaults();
      edit=false;
      showSettings=false; // 初期化結果が見えるようにシートを閉じる
      commit();
    }else{
      allResetConfirm=true;
      clearTimeout(allResetT);
      allResetT=setTimeout(function(){
        allResetConfirm=false;
        if(showSettings) render();
      },5000);
      render();
    }
  }
  else if(act==="fs"){ toggleFs(); }
  else if(act==="wake"){ if(wakeOn) disableWake(); else enableWake(true); }
  else if(act==="hidebar"){ hideBar=true; commit(); }
  else if(act==="showbar"){ hideBar=false; commit(); }
  else if(act==="reset"){
    snap();
    people.forEach(function(x){ x.done={}; });
    commit();
  }
  else if(act==="editmode"){ edit=!edit; confirmId=null; render(); }
  else if(act==="addperson"){
    snap();
    people.push({ id:uid(), name:"", pink:false, extras:baseExtras(), done:{} });
    commit();
  }
  else if(act==="pink"){
    p=findP(el.getAttribute("data-pid"));
    if(p){ snap(); p.pink=!p.pink; commit(); }
  }
  else if(act==="up"||act==="down"){
    id=el.getAttribute("data-pid");
    var idx=-1;
    for(i2=0;i2<people.length;i2++){ if(people[i2].id===id){ idx=i2; break; } }
    var j2=idx+(act==="up"?-1:1);
    if(idx>=0 && j2>=0 && j2<people.length){
      snap();
      var tmp=people[idx]; people[idx]=people[j2]; people[j2]=tmp;
      commit();
    }
  }
  else if(act==="del"){
    id=el.getAttribute("data-pid");
    if(confirmId===id){
      snap();
      people=people.filter(function(x){ return x.id!==id; });
      confirmId=null; commit();
    }else{
      confirmId=id;
      clearTimeout(confirmT);
      confirmT=setTimeout(function(){ confirmId=null; if(edit) render(); },2000);
      render();
    }
  }
});

document.addEventListener("input", function(e){
  var t=e.target;
  if(t.getAttribute && t.getAttribute("data-input")==="name"){
    var p=findP(t.getAttribute("data-pid"));
    if(p){ p.name=t.value; saveDebounced(); }
  }
  else if(t.id==="newlabel"){
    newLabel=t.value;
    var b=document.getElementById("addbtn");
    if(b){
      var hs=newLabel.trim();
      b.style.background=hs?PALETTE[newColor]:"#2a2a2a";
      b.style.color=hs?"#151515":"#666";
    }
  }
});

// ===== 起動 =====
// 名前の入力を始めるとき、変更前の状態を履歴に残す
document.addEventListener("focusin", function(e){
  if(e.target && e.target.classList && e.target.classList.contains("ename")) snap();
});
// ブラウザのダブルタップ拡大・ピンチ拡大を防ぐ
document.addEventListener("gesturestart", function(e){ e.preventDefault(); });
var lastTe=0;
document.addEventListener("touchend", function(e){
  if(e.target && e.target.closest && e.target.closest("input,textarea")) return;
  var now=Date.now();
  if(now-lastTe<350 && e.cancelable){
    e.preventDefault(); // 拡大をキャンセル
    var el=e.target.closest ? e.target.closest("[data-act]") : null;
    if(el) el.click(); // 2回目のタップ動作は手動で実行（ピンク切替などを維持）
  }
  lastTe=now;
},{passive:false});
var resizeT=null;
window.addEventListener("resize", function(){
  clearTimeout(resizeT);
  resizeT=setTimeout(function(){
    // 名前入力中の再描画はキーボードが閉じてしまうのでスキップ
    var ae=document.activeElement;
    if(ae && (ae.tagName==="INPUT"||ae.tagName==="TEXTAREA")) return;
    render();
  },120);
});
load();
render();
})();
</script>
